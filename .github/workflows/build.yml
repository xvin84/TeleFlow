name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: TeleFlow-linux-x86_64
            ext: ""
          - os: windows-latest
            artifact: TeleFlow-windows-x86_64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # Linux: need display for PyQt6 even in headless build
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxkbcommon-x11-0 libxcb-shape0 libxcb-render-util0 \
            libxcb-randr0 libxcb-xinerama0 libxcb-xfixes0

      - name: Install PyInstaller
        run: uv run pip install pyinstaller>=6.0 pillow

      - name: Build binary
        run: uv run pyinstaller teleflow.spec --clean --noconfirm

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/TeleFlow dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/TeleFlow.exe dist/${{ matrix.artifact }}.exe
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TeleFlow ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            dist/TeleFlow-linux-x86_64/TeleFlow-linux-x86_64
            dist/TeleFlow-windows-x86_64/TeleFlow-windows-x86_64.exe