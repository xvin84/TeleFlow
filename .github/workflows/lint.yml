name: Lint, Type Check & Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short